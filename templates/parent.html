<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家長專區｜皮克西共學教育</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
:root{
  --navy:#252b5f;
  --cream:#fffaf2;
  --yellow:#fff2a8;
  --pink:#f08a9c;
  --white:#fffdfa;
}
body{
  margin:0;
  background:var(--cream);
  font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
  color:var(--navy);
}
.page{
  min-height:100vh;
  max-width:720px;
  margin:0 auto;
  padding:28px 18px 42px;
}
.brand{
  text-align:center;
  margin:16px 0 26px;
}
.brand-title-wrap{
  display:inline-block;
  background:var(--navy);
  padding:13px 34px 17px;
  border-radius:30px;
}
.brand-title{
  color:var(--yellow);
  font-size:34px;
  font-weight:900;
}
.card{
  background:var(--white);
  border:4px solid var(--navy);
  border-radius:34px;
  padding:32px 24px;
  text-align:center;
  box-shadow:0 8px 22px rgba(0,0,0,.06);
}
h1{
  font-size:34px;
  margin:6px 0 16px;
}
.student{
  font-size:22px;
  font-weight:900;
  line-height:1.8;
  margin:18px 0 24px;
}
.menu{
  display:grid;
  gap:16px;
  margin-top:22px;
}
.menu a{
  display:block;
  text-decoration:none;
  background:var(--navy);
  color:var(--yellow);
  padding:18px;
  border-radius:22px;
  font-size:22px;
  font-weight:900;
}
.notice{
  display:none;
  text-align:left;
  margin-top:22px;
  background:#fff4f6;
  border:3px solid var(--pink);
  border-radius:24px;
  padding:22px;
  font-size:18px;
  line-height:1.8;
  font-weight:700;
}
.notice h2{
  text-align:center;
  margin:0 0 14px;
  font-size:26px;
  color:var(--navy);
}
.notice ul{
  margin:10px 0 10px 20px;
  padding:0;
}
.notice li{
  margin:6px 0;
}
.small{
  text-align:center;
  font-size:16px;
  margin-top:16px;
  color:#555;
}
</style>
</head>

<body>

<div class="page">

  <div class="brand">
    <div class="brand-title-wrap">
      <div class="brand-title">皮克西共學教育</div>
    </div>
  </div>

  <div class="card">

    <h1>家長專區</h1>

    <div class="student" id="studentBox">
      正在確認家長身分...
    </div>

    <div class="menu" id="menuBox" style="display:none;">
      <a href="/parent/pickup">接送通知</a>
      <a href="/parent/leave">請假申請</a>
      <a href="/parent/attendance">出缺席紀錄</a>
    </div>

    <div class="notice" id="noticeBox">
      <h2>尚未完成家長身分綁定</h2>

      <p>
        為了保護學生資料安全，家長專區需要先完成身分綁定後才能使用。
      </p>

      <p>完成綁定後即可使用：</p>

      <ul>
        <li>🚗 接送通知</li>
        <li>📝 線上請假</li>
        <li>📅 出缺席查詢</li>
      </ul>

      <p>
        若您尚未收到專屬綁定連結，請聯繫皮克西老師協助。
      </p>

      <div class="small">
        ※ 爸爸與媽媽皆可使用同一條學生專屬連結各自綁定。
      </div>
    </div>

  </div>

</div>

<script>
const LIFF_ID = "2009899432-t8zSVmZ5";

function showUnbound(message){
  document.getElementById("studentBox").innerText = message || "尚未完成家長身分綁定";
  document.getElementById("menuBox").style.display = "none";
  document.getElementById("noticeBox").style.display = "block";
}

async function init(){
  const studentBox = document.getElementById("studentBox");
  const menuBox = document.getElementById("menuBox");

  try{
    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login({
        redirectUri: window.location.href
      });
      return;
    }

    const profile = await liff.getProfile();
    const lineUserId = profile.userId;

    const res = await fetch(`/api/parent-student?line_user_id=${encodeURIComponent(lineUserId)}`);
    const data = await res.json();

    if(!data.ok){
      showUnbound("尚未完成家長身分綁定");
      return;
    }

    const students = data.students || [];

    if(students.length === 0){
      showUnbound("尚未完成家長身分綁定");
      return;
    }

    if(students.length === 1){
      const s = students[0];

      studentBox.innerHTML = `
        ${s.student_name} ${s.english_name || ""} 家長您好<br>
        年級：${s.grade || ""}<br>
        班級：${s.class_name || ""}
      `;

      menuBox.style.display = "grid";
      return;
    }

    let html = "請選擇學生：<br><br>";

    students.forEach(s => {
      html += `
        <div style="margin-bottom:14px;">
          ${s.student_name} ${s.english_name || ""}<br>
          <span style="font-size:18px;">${s.grade || ""}｜${s.class_name || ""}</span>
        </div>
      `;
    });

    studentBox.innerHTML = html;
    menuBox.style.display = "grid";

  }catch(err){
    console.log(err);
    showUnbound("目前無法確認家長身分");
  }
}

init();
</script>

</body>
</html>
