<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家長綁定｜皮克西共學教育</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
:root{
  --navy:#252b5f;
  --cream:#fffaf2;
  --yellow:#fff2a8;
  --pink:#f08a9c;
  --blue:#7b84c5;
  --pink2:#f6b4bf;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--cream);
  font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
  color:var(--navy);
}

.page{
  min-height:100vh;
  max-width:720px;
  margin:0 auto;
  padding:24px 18px 40px;
  border-left:4px solid var(--pink2);
  border-right:4px solid var(--pink2);
}

.brand{
  text-align:center;
  margin:18px 0 28px;
}

.brand-title-wrap{
  display:inline-block;
  background:var(--navy);
  padding:13px 34px 17px;
  border-radius:28px 34px 30px 32px;
  transform:rotate(-1.3deg);
}

.brand-title{
  color:var(--yellow);
  font-size:clamp(34px,8vw,58px);
  font-weight:900;
  letter-spacing:4px;
}

.brand-sub{
  display:inline-block;
  margin-top:-2px;
  background:var(--yellow);
  color:var(--navy);
  padding:8px 26px;
  border-radius:15px;
  font-size:clamp(22px,5vw,36px);
  font-weight:900;
}

.card{
  background:#fffdfa;
  border:4px solid var(--navy);
  border-radius:34px;
  padding:32px 26px;
  text-align:center;
  box-shadow:2px 2px 0 rgba(37,43,95,.16);
}

h1{
  font-size:42px;
  margin:0 0 14px;
  font-weight:900;
}

.line{
  width:70%;
  height:5px;
  background:var(--pink);
  border-radius:99px;
  margin:16px auto 24px;
}

.info{
  font-size:22px;
  line-height:1.8;
  font-weight:900;
  margin:24px 0;
  color:#333;
}

button{
  width:100%;
  margin-top:12px;
  padding:17px;
  border:0;
  border-radius:22px;
  background:var(--navy);
  color:var(--yellow);
  font-size:24px;
  font-weight:900;
  cursor:pointer;
}

.msg{
  margin-top:20px;
  font-size:19px;
  line-height:1.7;
  font-weight:900;
  color:var(--pink);
}
</style>
</head>

<body>
<div class="page">

  <div class="brand">
    <div class="brand-title-wrap">
      <div class="brand-title">皮克西共學教育</div>
    </div><br>
    <div class="brand-sub">PiXiE Education</div>
  </div>

  <div class="card">
    <h1>家長綁定</h1>
    <div class="line"></div>

    <div class="info" id="studentInfo">
      載入學生資料中...
    </div>

    <button onclick="confirmBind()">確認綁定</button>

    <div class="msg" id="msg"></div>
  </div>

</div>

<script>
const LIFF_ID = "2009899432-9KT6ckHI";
const params = new URLSearchParams(window.location.search);
const studentId = params.get("bind");

let lineUserId = "";

async function init(){
  const info = document.getElementById("studentInfo");
  const msg = document.getElementById("msg");

  if(!studentId){
    info.innerText = "缺少學生代碼，請聯絡老師。";
    return;
  }

  try{
    const res = await fetch(`/api/bind-student?student_id=${studentId}`);
    const data = await res.json();

    if(!data.ok){
      info.innerText = data.message || "找不到學生資料";
      return;
    }

    info.innerHTML = `
      學生：${data.student_name} ${data.english_name || ""}<br>
      年級：${data.grade || ""}<br>
      班級：${data.class_name || ""}
    `;

    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    lineUserId = profile.userId;

  }catch(err){
    msg.innerText = "載入失敗，請重新開啟連結。";
    console.log(err);
  }
}

async function confirmBind(){
  const msg = document.getElementById("msg");

  if(!studentId){
    msg.innerText = "缺少學生代碼。";
    return;
  }

  if(!lineUserId){
    msg.innerText = "尚未取得 LINE 身分，請重新開啟連結。";
    return;
  }

  try{
    const res = await fetch("/api/bind-confirm", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        student_id: studentId,
        line_user_id: lineUserId
      })
    });

    const data = await res.json();

    if(data.ok){
      msg.innerText = data.message || "綁定成功！之後即可使用家長專區。";
    }else{
      msg.innerText = data.message || "綁定失敗，請聯絡老師。";
    }

  }catch(err){
    msg.innerText = "綁定失敗，請稍後再試。";
    console.log(err);
  }
}

init();
</script>

</body>
</html>
