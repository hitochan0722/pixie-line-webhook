<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家長綁定｜皮克西共學教育</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
:root{
  --navy:#252b5f;
  --cream:#fffaf2;
  --yellow:#fff2a8;
  --pink:#f08a9c;
}
body{
  margin:0;
  background:var(--cream);
  font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
  color:var(--navy);
}
.page{
  min-height:100vh;
  max-width:720px;
  margin:0 auto;
  padding:24px 18px 40px;
}
.brand{
  text-align:center;
  margin:18px 0 28px;
}
.brand-title-wrap{
  display:inline-block;
  background:var(--navy);
  padding:13px 34px 17px;
  border-radius:30px;
}
.brand-title{
  color:var(--yellow);
  font-size:40px;
  font-weight:900;
}
.card{
  background:#fffdfa;
  border:4px solid var(--navy);
  border-radius:34px;
  padding:32px 26px;
  text-align:center;
}
h1{
  font-size:36px;
  margin-bottom:16px;
}
.info{
  font-size:22px;
  font-weight:900;
  margin:26px 0;
  line-height:1.8;
}
button{
  width:100%;
  padding:18px;
  border-radius:22px;
  border:0;
  background:var(--navy);
  color:var(--yellow);
  font-size:24px;
  font-weight:900;
}
button:disabled{
  opacity:.5;
}
.msg{
  margin-top:18px;
  font-size:18px;
  font-weight:900;
  color:var(--pink);
}
</style>
</head>

<body>

<div class="page">

  <div class="brand">
    <div class="brand-title-wrap">
      <div class="brand-title">皮克西共學教育</div>
    </div>
  </div>

  <div class="card">
    <h1>家長綁定</h1>

    <div class="info" id="studentInfo">
      載入學生資料中...
    </div>

    <button id="bindBtn" disabled>
      確認綁定
    </button>

    <div class="msg" id="msg"></div>
  </div>

</div>

<script>
const LIFF_ID = "2009899432-9KT6ckHI";

let lineUserId = "";
let studentId = "";

function readParamsFromSearch(search){
  const params = new URLSearchParams(search);

  return (
    params.get("bind") ||
    params.get("student") ||
    params.get("student_id") ||
    ""
  ).trim();
}

function getStudentId(){
  let id = readParamsFromSearch(window.location.search);

  if(id){
    return id;
  }

  const params = new URLSearchParams(window.location.search);
  let state = params.get("liff.state");

  if(state){
    state = decodeURIComponent(state);

    if(state.startsWith("?")){
      state = state.substring(1);
    }

    id = readParamsFromSearch("?" + state);

    if(id){
      return id;
    }
  }

  return "";
}

async function init(){
  const info = document.getElementById("studentInfo");
  const msg = document.getElementById("msg");
  const bindBtn = document.getElementById("bindBtn");

  studentId = getStudentId();

  if(!studentId){
    info.innerText = "缺少學生代碼，請聯絡老師。";
    return;
  }

  try{
    const res = await fetch(`/api/bind-student?student_id=${encodeURIComponent(studentId)}`);
    const data = await res.json();

    if(!data.ok){
      info.innerText = data.message || "找不到學生資料";
      return;
    }

    info.innerHTML = `
      學生：${data.student_name} ${data.english_name || ""}<br>
      年級：${data.grade || ""}<br>
      班級：${data.class_name || ""}
    `;

    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
      liff.login({
        redirectUri: window.location.href
      });
      return;
    }

    const profile = await liff.getProfile();
    lineUserId = profile.userId;

    bindBtn.disabled = false;
    msg.innerText = "";

  }catch(err){
    console.log(err);
    info.innerText = "載入失敗，請重新開啟連結。";
  }
}

document.getElementById("bindBtn").addEventListener("click", async () => {
  const msg = document.getElementById("msg");
  const bindBtn = document.getElementById("bindBtn");

  msg.innerText = "正在綁定中...";
  bindBtn.disabled = true;

  if(!studentId){
    msg.innerText = "缺少學生代碼，請重新開啟連結。";
    bindBtn.disabled = false;
    return;
  }

  if(!lineUserId){
    msg.innerText = "無法取得 LINE 身分，請重新開啟。";
    bindBtn.disabled = false;
    return;
  }

  try{
    const res = await fetch("/api/bind-confirm", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        student_id: studentId,
        line_user_id: lineUserId
      })
    });

    const data = await res.json();

    msg.innerText = data.message || "綁定完成。";

  }catch(err){
    console.log(err);
    msg.innerText = "綁定失敗，請稍後再試。";
  }

  bindBtn.disabled = false;
});

init();
</script>

</body>
</html>
