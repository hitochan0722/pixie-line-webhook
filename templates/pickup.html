<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>接送通知｜皮克西共學教育</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root{--navy:#252b5f;--cream:#fffaf2;--yellow:#fff2a8;--pink:#f08a9c;--pink2:#f6b4bf}
*{box-sizing:border-box}
body{margin:0;background:var(--cream);color:var(--navy);font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif}
.page{min-height:100vh;max-width:900px;margin:0 auto;padding:24px 18px 34px}
.brand{text-align:center;margin:18px 0 28px}
.brand-title{display:inline-block;background:var(--navy);color:var(--yellow);padding:18px 38px;border-radius:30px;font-size:clamp(34px,8vw,58px);font-weight:900;letter-spacing:3px}
.brand-sub{display:inline-block;margin-top:-4px;background:var(--yellow);padding:8px 28px;border-radius:16px;font-size:clamp(22px,5vw,36px);font-weight:900}
.card{background:#fffdfa;border:4px solid var(--navy);border-radius:34px;padding:24px;max-width:680px;margin:0 auto;box-shadow:2px 2px 0 rgba(37,43,95,.18)}
.title{font-size:clamp(34px,8vw,50px);font-weight:900;text-align:center}
.line{width:68%;height:4px;background:var(--pink);border-radius:99px;margin:14px auto 20px}
label{display:block;font-size:20px;font-weight:900;margin:16px 0 8px}
input,select,textarea{width:100%;border:4px solid var(--navy);border-radius:22px;padding:16px;font-size:20px;font-weight:800;background:#fffdfa;color:#333}
textarea{min-height:110px;resize:vertical}
.student-info{background:#fff4f6;border:3px solid var(--pink2);border-radius:20px;padding:14px 16px;margin-bottom:12px;font-size:18px;font-weight:800;line-height:1.6}
.btn{display:block;width:100%;margin-top:20px;border:0;border-radius:24px;padding:18px;background:var(--pink);color:white;font-size:26px;font-weight:900;text-align:center;text-decoration:none}
.btn:disabled{opacity:.55}
.back{background:var(--navy);color:var(--yellow)}
.note{margin-top:14px;font-size:16px;line-height:1.7;color:#555;font-weight:700;text-align:center}
.note.error{color:#b3261e}.note.success{color:#16723d}
.hidden{display:none}
@media(max-width:700px){.page{padding:18px 14px 28px}.card{padding:20px 16px}}
</style>
</head>
<body>
<div class="page">
  <div class="brand"><div class="brand-title">皮克西共學教育</div><br><div class="brand-sub">PiXiE Education</div></div>
  <div class="card">
    <div class="title">接送通知</div><div class="line"></div>
    <div id="studentInfo" class="student-info">正在讀取已綁定學生…</div>
    <div id="pickupForm" class="hidden">
      <label for="studentSelect">接送學生</label>
      <select id="studentSelect"></select>
      <button id="pickupBtn" class="btn" type="button">我要接送</button>
    </div>
    <div id="status" class="note">家長不需要輸入學生姓名。</div>
    <a class="btn back" href="/parent">返回家長專區</a>
  </div>
</div>
<script>
const LIFF_ID="2009899432-t8zSVmZ5";
let profile=null,students=[];
const statusBox=document.getElementById("status");
function status(msg,type=""){statusBox.textContent=msg;statusBox.className="note "+type;}
async function init(){
 try{
  await liff.init({liffId:LIFF_ID});
  if(!liff.isLoggedIn()){liff.login({redirectUri:location.href});return;}
  profile=await liff.getProfile();
  const res=await fetch(`/api/parent-student?line_user_id=${encodeURIComponent(profile.userId)}`);
  const data=await res.json();
  if(!res.ok||!data.ok)throw new Error(data.message||"無法確認家長身分");
  students=data.students||[];
  if(!students.length)throw new Error("尚未綁定學生");
  const select=document.getElementById("studentSelect");
  select.innerHTML=students.map(s=>`<option value="${s.student_id}">${s.student_name} ${s.english_name||""}｜${s.class_name||""}</option>`).join("");
  document.getElementById("studentInfo").textContent=students.length===1
   ? `已綁定學生：${students[0].student_name} ${students[0].english_name||""}｜${students[0].class_name||""}`
   : `此帳號已綁定 ${students.length} 位學生，請在下方選擇。`;
  document.getElementById("pickupForm").classList.remove("hidden");
  status("選擇學生後按「我要接送」。");
 }catch(e){status(e.message||"讀取失敗","error");document.getElementById("studentInfo").textContent="目前無法讀取綁定資料";}
}
document.getElementById("pickupBtn").addEventListener("click",async()=>{
 const studentId=document.getElementById("studentSelect").value;
 if(!studentId){status("請選擇學生。","error");return;}
 const btn=document.getElementById("pickupBtn");btn.disabled=true;status("正在送出接送通知…");
 try{const res=await fetch("/api/parent-pickup",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({line_user_id:profile.userId,line_display_name:profile.displayName,student_id:studentId})});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.message||"送出失敗");status("✅ "+data.message,"success");}
 catch(err){status(err.message||"送出失敗","error");}finally{btn.disabled=false;}
});
init();
</script>
</body></html>
