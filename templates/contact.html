<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聯絡與匯款資訊</title>
<style>
:root{
  --navy:#252b5f;
  --cream:#fffaf2;
  --yellow:#fff2a8;
  --pink:#f08a9c;
  --pink2:#f6b4bf;
  --blue:#7b84c5;
  --text:#252b5f;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--cream);
  color:var(--text);
  font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
}
.page{
  min-height:100vh;
  max-width:900px;
  margin:0 auto;
  padding:24px 18px 34px;
  border:4px solid var(--pink2);
  border-radius:30px;
}
.brand{
  text-align:center;
  margin:18px 0 28px;
}
.brand-title-wrap{
  display:inline-block;
  background:var(--navy);
  padding:13px 34px 17px;
  border-radius:28px 34px 30px 32px;
  transform:rotate(-1.5deg);
  box-shadow:
    2px 2px 0 rgba(37,43,95,.45),
    -2px 1px 0 rgba(37,43,95,.25);
}
.brand-title{
  color:var(--yellow);
  font-size:clamp(34px,8vw,58px);
  font-weight:900;
  letter-spacing:4px;
  line-height:1.08;
  text-shadow:
    1px 1px 0 #fff3b8,
    -1px 0 0 #fff3b8;
}
.brand-sub{
  display:inline-block;
  margin-top:-2px;
  background:var(--yellow);
  color:var(--navy);
  padding:8px 26px;
  border-radius:15px;
  font-size:clamp(22px,5vw,36px);
  font-weight:900;
  letter-spacing:1px;
  transform:rotate(.3deg);
}
.menu-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
  margin:12px auto 18px;
}
.menu-card{
  position:relative;
  min-height:145px;
  padding:20px 22px;
  display:flex;
  align-items:center;
  text-decoration:none;
  color:var(--navy);
  background:#fffdfa;
  border-radius:34px 38px 32px 36px;
  border:4px solid var(--navy);
  box-shadow:
    2px 2px 0 rgba(37,43,95,.18),
    -2px 1px 0 rgba(37,43,95,.15),
    inset 1px 1px 0 rgba(37,43,95,.12);
}
.menu-card:before{
  content:"";
  position:absolute;
  inset:-4px;
  border:3px solid var(--navy);
  border-radius:39px 33px 37px 31px;
  transform:rotate(-.5deg);
  pointer-events:none;
  opacity:.9;
}
.menu-card:nth-child(even):before{ transform:rotate(.6deg); }
.menu-card .icon{
  font-size:44px;
  width:58px;
  text-align:center;
  margin-right:15px;
}
.menu-card .main{
  font-size:clamp(28px,6vw,42px);
  font-weight:900;
  letter-spacing:2px;
  line-height:1.08;
  text-shadow:.6px .6px 0 var(--navy);
}
.menu-card .line{
  width:76%;
  height:3px;
  margin:12px 0 6px;
  background:var(--pink);
  border-radius:99px;
}
.menu-card .sub{
  color:#333;
  font-size:clamp(15px,3.6vw,22px);
  font-weight:900;
  letter-spacing:1px;
}
.menu-card .arrow{
  margin-left:auto;
  font-size:50px;
  line-height:1;
  color:var(--pink);
  font-weight:900;
}
.menu-card.blue .line{background:var(--blue);}
.menu-card.blue .arrow{color:var(--blue);}
.footer-heart{
  color:var(--pink);
  text-align:center;
  font-size:42px;
  margin-top:16px;
}
.info-card{
  position:relative;
  background:#fffdfa;
  border:4px solid var(--navy);
  border-radius:30px 36px 32px 34px;
  padding:20px 22px;
  margin:16px auto;
  max-width:700px;
  text-align:left;
  box-shadow:2px 2px 0 rgba(37,43,95,.18);
}
.info-card:before{
  content:"";
  position:absolute;
  inset:-4px;
  border:3px solid var(--navy);
  border-radius:36px 30px 34px 32px;
  transform:rotate(.4deg);
  pointer-events:none;
  opacity:.9;
}
.info-title{
  color:var(--pink);
  font-size:24px;
  font-weight:900;
  margin-bottom:8px;
}
.info-text{
  font-size:21px;
  line-height:1.75;
  font-weight:800;
  color:#333;
}
.back{
  display:block;
  width:min(360px,90%);
  margin:24px auto 0;
  text-align:center;
  background:var(--navy);
  color:var(--yellow);
  padding:16px;
  border-radius:22px;
  text-decoration:none;
  font-size:22px;
  font-weight:900;
}
@media(max-width:700px){
  .page{border:0;border-radius:0;padding:18px 14px 28px;}
  .menu-grid{grid-template-columns:1fr;gap:16px;}
  .menu-card{min-height:124px;}
}
</style>
</head>
<body>
<div class="page">
  <div class="brand">
    <div class="brand-title-wrap"><div class="brand-title">皮克西共學教育</div></div><br>
    <div class="brand-sub">PiXiE Education</div>
  </div>

  <div class="info-card">
    <div class="info-title">📍 地址</div>
    <div class="info-text">桃園市桃園區正光二街125號2樓</div>
  </div>

  <div class="info-card">
    <div class="info-title">📞 電話</div>
    <div class="info-text">03-3609856</div>
  </div>

  <div class="info-card">
    <div class="info-title">🕒 營業時間</div>
    <div class="info-text">週一至週五 12:00-20:00<br>週六 10:00-12:00</div>
  </div>

  <div class="info-card">
    <div class="info-title">🏦 匯款資訊</div>
    <div class="info-text">
      戶名：皮克西文化事業有限公司<br>
      銀行：中國信託（代碼822）<br>
      帳號：8535-4036-0619
    </div>
  </div>

  <a class="back" href="/parent">返回家長專區</a>
</div>
</body>
</html>
