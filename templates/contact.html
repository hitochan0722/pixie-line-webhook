<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聯絡與匯款資訊</title>
<style>
:root{
  --navy:#262d61;
  --cream:#fffaf0;
  --yellow:#fff2a8;
  --pink:#f28aa0;
  --pink2:#f6b2bd;
  --blue:#7d86c8;
  --text:#20244a;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
  background:var(--cream);
  color:var(--text);
}
.page{
  width:min(94vw,900px);
  min-height:100vh;
  margin:0 auto;
  padding:24px 18px 34px;
  border:4px solid var(--pink2);
  border-radius:28px;
}
.brand{
  text-align:center;
  padding-top:14px;
  margin-bottom:28px;
}
.brand-title{
  display:inline-block;
  background:var(--navy);
  color:var(--yellow);
  padding:14px 30px 16px;
  border-radius:28px;
  font-size:clamp(34px,8vw,58px);
  font-weight:900;
  letter-spacing:4px;
  line-height:1.15;
  transform:rotate(-1.5deg);
  box-shadow:0 4px 0 rgba(38,45,97,.12);
}
.brand-sub{
  display:inline-block;
  margin-top:-2px;
  background:var(--yellow);
  color:var(--navy);
  padding:8px 26px;
  border-radius:16px;
  font-size:clamp(22px,5vw,36px);
  font-weight:900;
  letter-spacing:1px;
}
.menu-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
  margin:20px auto 10px;
}
.menu-card{
  position:relative;
  display:flex;
  align-items:center;
  min-height:150px;
  padding:22px 22px;
  background:#fffdfa;
  color:var(--navy);
  border:5px dashed var(--navy);
  border-radius:34px;
  text-decoration:none;
  overflow:hidden;
}
.menu-card .icon{
  font-size:46px;
  margin-right:18px;
  flex:0 0 auto;
}
.menu-card .txt{
  text-align:left;
  flex:1;
}
.menu-card .main{
  font-size:clamp(28px,6vw,44px);
  font-weight:900;
  line-height:1.1;
}
.menu-card .sub{
  margin-top:10px;
  font-size:clamp(16px,3.8vw,24px);
  font-weight:800;
  color:#333;
}
.menu-card .line{
  margin-top:12px;
  height:3px;
  width:70%;
  background:var(--pink);
  border-radius:100px;
}
.menu-card .arrow{
  font-size:46px;
  font-weight:900;
  color:var(--pink);
  margin-left:8px;
}
.menu-card.blue .line{background:var(--blue)}
.menu-card.blue .arrow{color:var(--blue)}
.footer-heart{
  text-align:center;
  font-size:42px;
  color:var(--pink);
  margin-top:28px;
}
.info-card{
  background:#fffdfa;
  border:4px dashed var(--navy);
  border-radius:28px;
  padding:20px 22px;
  margin:16px auto;
  max-width:720px;
  text-align:left;
}
.info-title{
  font-size:24px;
  font-weight:900;
  color:var(--pink);
  margin-bottom:8px;
}
.info-text{
  font-size:21px;
  line-height:1.75;
  font-weight:700;
}
.back{
  display:block;
  margin:26px auto 0;
  width:min(360px,90%);
  text-align:center;
  padding:16px;
  border-radius:24px;
  background:var(--navy);
  color:var(--yellow);
  text-decoration:none;
  font-size:22px;
  font-weight:900;
}
.placeholder{
  font-size:22px;
  font-weight:800;
  line-height:1.8;
  text-align:center;
}
@media(max-width:700px){
  .page{width:100%;border-width:0;border-radius:0;padding:18px 14px 28px}
  .menu-grid{grid-template-columns:1fr;gap:16px}
  .menu-card{min-height:128px;border-width:4px}
  .menu-card .icon{font-size:42px}
}
</style>
</head>
<body>
<div class="page">
  <div class="brand">
    <div class="brand-title">皮克西共學教育</div><br>
    <div class="brand-sub">PiXiE Education</div>
  </div>

  <div class="info-card">
    <div class="info-title">📍 地址</div>
    <div class="info-text">桃園市桃園區正光二街125號2樓</div>
  </div>

  <div class="info-card">
    <div class="info-title">📞 電話</div>
    <div class="info-text">03-3609856</div>
  </div>

  <div class="info-card">
    <div class="info-title">🕒 營業時間</div>
    <div class="info-text">週一至週五 12:00-20:00<br>週六 10:00-12:00</div>
  </div>

  <div class="info-card">
    <div class="info-title">🏦 匯款資訊</div>
    <div class="info-text">
      戶名：皮克西文化事業有限公司<br>
      銀行：中國信託（代碼822）<br>
      帳號：8535-4036-0619
    </div>
  </div>

  <a class="back" href="/parent">返回家長專區</a>
</div>
</body>
</html>
