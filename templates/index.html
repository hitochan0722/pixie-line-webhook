<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>皮克西共學教育</title>

<style>

:root{
  --navy:#252b5f;
  --cream:#fffaf2;
  --yellow:#fff2a8;
  --pink:#f08a9c;
  --blue:#7b84c5;
}

body{
  margin:0;
  background:var(--cream);
  font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
}

.page{
  min-height:100vh;
  max-width:900px;
  margin:0 auto;
  padding:24px 18px 40px;
}

/* LOGO */

.brand{
  text-align:center;
  margin-bottom:36px;
}

.brand-title-wrap{
  display:inline-block;
  background:var(--navy);
  padding:14px 36px 18px;
  border-radius:32px;
  transform:rotate(-1deg);
}

.brand-title{
  color:var(--yellow);
  font-size:clamp(38px,8vw,60px);
  font-weight:900;
  letter-spacing:4px;
}

.brand-sub{
  display:inline-block;
  margin-top:8px;
  background:var(--yellow);
  color:var(--navy);
  padding:8px 26px;
  border-radius:16px;
  font-size:clamp(24px,5vw,36px);
  font-weight:900;
}

/* 卡片 */

.menu-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:28px;
}

.menu-card{
  position:relative;
  background:white;
  border-radius:38px;
  padding:36px 28px 34px;
  text-align:center;
  text-decoration:none;
  color:var(--navy);

  border:4px solid var(--navy);

  box-shadow:
    2px 2px 0 rgba(37,43,95,.18);
}

/* 手繪外框 */

.menu-card:before{
  content:"";
  position:absolute;
  inset:-4px;
  border:3px solid var(--navy);
  border-radius:42px;
  transform:rotate(-.5deg);
  pointer-events:none;
}

/* icon */

.icon{
  font-size:54px;
  margin-bottom:10px;
}

/* 主標題 */

.main{
  font-size:40px;
  font-weight:900;
  margin-bottom:10px;
}

/* 副標 */

.sub{
  font-size:22px;
  font-weight:800;
  margin-bottom:22px;
}

/* 短按鈕 */

.button{
  display:inline-block;

  padding:14px 60px;

  border-radius:999px;

  font-size:24px;
  font-weight:900;
  color:white;

  background:var(--pink);
}

/* 藍色按鈕 */

.blue .button{
  background:var(--blue);
}

/* 手機 */

@media(max-width:700px){

.menu-grid{
  grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="page">

<!-- LOGO -->

<div class="brand">

<div class="brand-title-wrap">
<div class="brand-title">
皮克西共學教育
</div>
</div>

<br>

<div class="brand-sub">
PiXiE Education
</div>

</div>

<!-- 兩大入口 -->

<div class="menu-grid">

<!-- 家長專區 -->

<a class="menu-card"
href="/parent">

<div class="icon">👨‍👩‍👧</div>

<div class="main">
家長專區
</div>

<div class="sub">
接送・請假・出缺席
</div>

<div class="button">
進入
</div>

</a>

<!-- 新生入口 -->

<a class="menu-card blue"
href="/parent/new-student">

<div class="icon">📖</div>

<div class="main">
新生入口
</div>

<div class="sub">
填寫問班資料
</div>

<div class="button">
進入
</div>

</a>

</div>

</div>

</body>
</html>
