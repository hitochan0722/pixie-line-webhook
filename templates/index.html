<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮克西共學教育</title>

<style>

:root{
  --navy:#252b5f;
  --cream:#fffaf2;
  --yellow:#fff2a8;
  --pink:#f08a9c;
}

body{
  margin:0;
  background:var(--cream);
  font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
}

.page{
  min-height:100vh;
  max-width:900px;
  margin:0 auto;
  padding:24px 18px 40px;
}

.brand{
  text-align:center;
  margin-bottom:30px;
}

.brand-title-wrap{
  display:inline-block;
  background:var(--navy);
  padding:15px 40px;
  border-radius:32px;
}

.brand-title{
  color:var(--yellow);
  font-size:clamp(36px,8vw,60px);
  font-weight:900;
  letter-spacing:4px;
}

.brand-sub{
  display:inline-block;
  margin-top:10px;
  background:var(--yellow);
  color:var(--navy);
  padding:8px 26px;
  border-radius:16px;
  font-size:clamp(24px,5vw,36px);
  font-weight:900;
}

.menu-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:26px;
}

.menu-card{
  text-decoration:none;
  color:var(--navy);
  background:white;
  border-radius:34px;
  border:4px solid var(--navy);
  padding:28px 22px;
  text-align:center;
}

.icon{
  font-size:56px;
  margin-bottom:10px;
}

.main{
  font-size:40px;
  font-weight:900;
  margin-bottom:12px;
}

.sub{
  font-size:22px;
  font-weight:700;
  margin-bottom:20px;
}

.button{
  display:inline-block;
  width:100%;
  background:var(--pink);
  color:white;
  padding:16px;
  border-radius:20px;
  font-size:26px;
  font-weight:900;
}

.blue .button{
  background:#6c76b9;
}

@media(max-width:700px){

.menu-grid{
  grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="page">

<div class="brand">

<div class="brand-title-wrap">
<div class="brand-title">
皮克西共學教育
</div>
</div>

<br>

<div class="brand-sub">
PiXiE Education
</div>

</div>

<div class="menu-grid">

<!-- 家長專區 -->

<a class="menu-card"
href="/parent">

<div class="icon">👨‍👩‍👧</div>

<div class="main">
家長專區
</div>

<div class="sub">
接送・請假・出缺席
</div>

<div class="button">
進入
</div>

</a>

<!-- 新生入口 -->

<a class="menu-card blue"
href="/parent/new-student">

<div class="icon">📖</div>

<div class="main">
新生入口
</div>

<div class="sub">
填寫問班資料
</div>

<div class="button">
進入
</div>

</a>

</div>

</div>

</body>
</html>
