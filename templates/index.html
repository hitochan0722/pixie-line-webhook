<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮克西共學教育</title>
<style>
:root{
  --navy:#252b5f;
  --cream:#fffaf2;
  --yellow:#fff2a8;
  --pink:#f08a9c;
  --blue:#7b84c5;
  --pink2:#f6b4bf;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--cream);
  font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
  color:var(--navy);
}
.page{
  min-height:100vh;
  max-width:980px;
  margin:0 auto;
  padding:24px 22px 34px;
  border:4px solid var(--pink2);
  border-radius:30px;
}
.brand{
  text-align:center;
  margin:18px 0 30px;
  position:relative;
}
.brand-title-wrap{
  display:inline-block;
  background:var(--navy);
  padding:15px 42px 18px;
  border-radius:35px 42px 34px 40px;
  transform:rotate(-1.2deg);
  box-shadow:2px 2px 0 rgba(37,43,95,.35);
}
.brand-title{
  color:var(--yellow);
  font-size:clamp(42px,8vw,72px);
  font-weight:900;
  letter-spacing:5px;
  line-height:1.08;
}
.brand-sub{
  display:inline-block;
  margin-top:-4px;
  background:var(--yellow);
  color:var(--navy);
  padding:9px 34px;
  border-radius:18px;
  font-size:clamp(26px,5vw,42px);
  font-weight:900;
}
.spark{
  position:absolute;
  top:150px;
  color:var(--pink);
  font-size:54px;
  font-weight:900;
}
.spark.left{left:70px; transform:rotate(20deg);}
.spark.right{right:70px; transform:rotate(-20deg);}

.menu-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:42px;
  margin-top:24px;
}
.big-card{
  position:relative;
  display:block;
  text-decoration:none;
  color:var(--navy);
  background:#fffdfa;
  border:6px solid var(--navy);
  border-radius:44px;
  padding:38px 30px 36px;
  text-align:center;
  min-height:430px;
  box-shadow:2px 2px 0 rgba(37,43,95,.12);
}
.big-card:before{
  content:"";
  position:absolute;
  inset:-6px;
  border:4px solid var(--navy);
  border-radius:50px 42px 48px 44px;
  transform:rotate(-.4deg);
  pointer-events:none;
  opacity:.9;
}
.big-card.blue:before{
  transform:rotate(.4deg);
}
.icon{
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:76px;
  margin-bottom:8px;
}
.main{
  font-size:clamp(44px,7vw,64px);
  font-weight:900;
  letter-spacing:4px;
  line-height:1.1;
}
.line-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin:18px auto 20px;
}
.line{
  width:140px;
  height:5px;
  background:var(--pink);
  border-radius:99px;
}
.heart{
  font-size:30px;
  color:var(--pink);
}
.sub{
  color:#222;
  font-size:clamp(24px,4vw,34px);
  font-weight:900;
  letter-spacing:3px;
  margin-bottom:34px;
}
.btn{
  display:block;
  width:78%;
  margin:0 auto;
  padding:18px 0;
  border-radius:22px;
  background:linear-gradient(180deg,#f392a2,#ee798e);
  color:white;
  font-size:42px;
  font-weight:900;
  line-height:1;
}
.blue .line{background:var(--blue);}
.blue .heart{color:var(--blue);}
.blue .btn{
  background:linear-gradient(180deg,#8792d3,#6f79bd);
}
.footer-heart{
  width:70px;
  height:70px;
  margin:18px auto 0;
  border-radius:50% 50% 48% 48%;
  color:white;
  background:var(--pink);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
}
@media(max-width:760px){
  .page{
    border-left:4px solid var(--pink2);
    border-right:4px solid var(--pink2);
    border-top:0;
    border-bottom:0;
    border-radius:0;
    padding:20px 16px 32px;
  }
  .menu-grid{
    grid-template-columns:1fr;
    gap:24px;
  }
  .big-card{
    min-height:330px;
    padding:28px 22px 30px;
  }
  .icon{
    height:80px;
    font-size:58px;
  }
  .btn{
    font-size:34px;
    padding:15px 0;
  }
  .spark{display:none;}
}
</style>
</head>

<body>
<div class="page">

  <div class="brand">
    <div class="brand-title-wrap">
      <div class="brand-title">皮克西共學教育</div>
    </div><br>
    <div class="brand-sub">PiXiE Education</div>
    <div class="spark left">〝</div>
    <div class="spark right">〞</div>
  </div>

  <div class="menu-grid">

    <a class="big-card" href="/parent">
      <div class="icon">♡</div>
      <div class="main">家長專區</div>
      <div class="line-wrap">
        <div class="line"></div>
        <div class="heart">♥</div>
        <div class="line"></div>
      </div>
      <div class="sub">接送・請假・出缺席</div>
      <div class="btn">›</div>
    </a>

    <a class="big-card blue" href="/new-parent">
      <div class="icon">📖</div>
      <div class="main">新生入口</div>
      <div class="line-wrap">
        <div class="line"></div>
        <div class="heart">♥</div>
        <div class="line"></div>
      </div>
      <div class="sub">課程介紹・預約試聽</div>
      <div class="btn">›</div>
    </a>

  </div>

  <div class="footer-heart">♡</div>

</div>
</body>
</html>
